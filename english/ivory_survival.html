<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IVORY HOUSE SURVIVAL</title>

<link rel="stylesheet" href="common.css">

</head>
<body>
<div id="game-container">
  <div class="title-bar">
    <h1>IVORY HOUSE SURVIVAL</h1>
  </div>
  <p class="use-hint caution">This game is a Ranfren fan work. It has no affiliation with the original creator.</p>
  <div class="inventory">
    <div class="inv-label">Inventory</div>
    <div class="inv-items" id="inventory">
      <div class="foods"></div>
      <div class="others"></div>
    </div>
    <small class="itemTxt use-hint" id="item-desc"></small>
  </div>

    <div id="debug-panel" style="background:#1a1a2e;border:1px dashed #555;padding:6px 10px;font-size:0.75rem;color:#aaa;display:none;gap:12px;align-items:center;flex-wrap:wrap">
    <span style="color:#888">DEBUG</span>
    <span style="display: block;width: 80%;">Bond: <strong id="debug-bond">0</strong> / 12
      <button onclick="debugBond(-1)" style="padding:0 6px;font-size:0.72rem;background:#333;color:#ccc;border:1px solid #555;cursor:pointer">−</button>
      <button onclick="debugBond(1)"  style="padding:0 6px;font-size:0.72rem;background:#333;color:#ccc;border:1px solid #555;cursor:pointer">＋</button>
    </span>
    <button onclick="debugKeyDoor()" style="padding:2px 10px;font-size:0.72rem;background:#333;color:#ccc;border:1px solid #555;cursor:pointer">Key Event</button>
    <button onclick="debugEvent('wall_mouth')" style="padding:2px 10px;font-size:0.72rem;background:#333;color:#ccc;border:1px solid #555;cursor:pointer">Wall Mouth Event</button>
    <span style="display:flex;align-items:center;gap:4px">
      <input id="debug-event-id" type="text" placeholder="Character name (English)" style="padding:2px 6px;font-size:0.72rem;background:#222;color:#ccc;border:1px solid #555;width:120px">
      <button onclick="debugEvent(document.getElementById('debug-event-id').value)" style="padding:2px 10px;font-size:0.72rem;background:#333;color:#ccc;border:1px solid #555;cursor:pointer">Run</button>
    </span>
  </div>

  <div id="confused-banner" style="display:none">CONFUSED!</div>

  <div class="stats">
    <div class="stat-block">
      <div class="stat-label">HP</div>
      <div class="stat-bar-wrap"><div class="stat-bar hp" id="hp-bar" style="width:100%"></div></div>
      <div class="stat-value" id="hp-val">100 / 100</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">MP</div>
      <div class="stat-bar-wrap"><div class="stat-bar mp" id="mp-bar" style="width:100%"></div></div>
      <div class="stat-value" id="mp-val">100 / 100</div>
    </div>
  </div>

  <div id="prologue-skip-area">
    <button class="choice-btn" onclick="skipPrologue()">Skip Prologue</button>
  </div>

  <div class="main-panel fade-in" id="main-panel">
    <!-- content injected here -->
  </div>

</div>

<script src="game_data.js" defer></script>
<script src="seba_talks.js" defer></script>
<script src="seba_txt.js" defer></script>
<script src="common.js" defer></script>
<script src="tutorial.js" defer></script>

</body>
</html>
